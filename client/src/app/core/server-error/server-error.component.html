<div class="container mt-5">
    <h4>Internal Server Error 500 - refreshing page will make the exception disappear</h4>
    <ng-container *ngIf="error">
        <h5 class="text-danger">Error {{error.message}}</h5>
        <p class="font-weight-bold">Note: if you are seeing rhis then Angular is probably not responsible</p>
    </ng-container>
</div>
